[pytest]
testpaths = tests
addopts =
    --verbose
    --tb=short
    --strict-markers
    --cov=analytics
    --cov=trading_bot
    --cov=config
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

markers =
    unit: Fast isolated unit tests (no I/O or network)
    integration: End-to-end pipeline and bot integration tests
    slow: Tests that take more than 5 seconds
    bot: Tests touching the trading bot modules
    analytics: Tests touching the analytics pipeline

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:streamlit
