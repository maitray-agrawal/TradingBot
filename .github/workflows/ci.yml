name: PrimeTrade AI CI/CD

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: primetrade-ai

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Format Check ─────────────────────────────────────────────
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 flake8-bugbear flake8-comprehensions

      - name: Check formatting with black
        run: black --check --diff --line-length=127 .

      - name: Check import ordering with isort
        run: isort --check-only --diff --profile black --line-length=127 .

      - name: Lint with flake8 (syntax errors & undefined names)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (full check)
        run: |
          flake8 . --count --exit-zero \
            --max-line-length=127 \
            --max-complexity=12 \
            --extend-ignore=E203,W503 \
            --exclude=venv,.venv,dashboard \
            --statistics

  # ── Job 2: Unit Tests with Coverage ───────────────────────────────────────
  test:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov coverage

      - name: Create required runtime directories
        run: |
          mkdir -p data/raw data/processed data/uploads data/exports logs
          mkdir -p analytics/outputs/charts analytics/outputs/reports
          mkdir -p analytics/reports/generated

      - name: Set environment variables for tests
        run: |
          echo "BINANCE_API_KEY=test_key" >> $GITHUB_ENV
          echo "BINANCE_SECRET_KEY=test_secret" >> $GITHUB_ENV
          echo "PROJECT_ENV=DEVELOPMENT" >> $GITHUB_ENV
          echo "LOG_LEVEL=DEBUG" >> $GITHUB_ENV
          echo "DRY_RUN=true" >> $GITHUB_ENV
          echo "DEFAULT_LEVERAGE=10" >> $GITHUB_ENV
          echo "MAX_LEVERAGE=20" >> $GITHUB_ENV
          echo "MAX_DRAWDOWN_PCT=15.0" >> $GITHUB_ENV
          echo "MAX_CAPITAL_AT_RISK_PCT=50.0" >> $GITHUB_ENV
          echo "MAX_SINGLE_TRADE_PCT=10.0" >> $GITHUB_ENV

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            -m "not integration" \
            --cov=analytics \
            --cov=trading_bot \
            --cov=config \
            --cov=utils \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == env.PYTHON_VERSION
        with:
          file: coverage.xml
          flags: unittests
          name: codecov-primetrade
          fail_ci_if_error: false

      - name: Archive coverage HTML report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_VERSION
        with:
          name: coverage-html-report
          path: htmlcov/
          retention-days: 7

  # ── Job 3: Integration Tests ───────────────────────────────────────────────
  integration:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Create runtime directories
        run: |
          mkdir -p data/raw data/processed data/uploads data/exports logs
          mkdir -p analytics/outputs/charts analytics/outputs/reports
          mkdir -p analytics/reports/generated

      - name: Set test environment variables
        run: |
          echo "BINANCE_API_KEY=test_key" >> $GITHUB_ENV
          echo "BINANCE_SECRET_KEY=test_secret" >> $GITHUB_ENV
          echo "PROJECT_ENV=DEVELOPMENT" >> $GITHUB_ENV
          echo "LOG_LEVEL=DEBUG" >> $GITHUB_ENV
          echo "DRY_RUN=true" >> $GITHUB_ENV
          echo "DEFAULT_LEVERAGE=10" >> $GITHUB_ENV
          echo "MAX_LEVERAGE=20" >> $GITHUB_ENV
          echo "MAX_DRAWDOWN_PCT=15.0" >> $GITHUB_ENV
          echo "MAX_CAPITAL_AT_RISK_PCT=50.0" >> $GITHUB_ENV
          echo "MAX_SINGLE_TRADE_PCT=10.0" >> $GITHUB_ENV

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -m integration \
            --tb=short \
            -v

  # ── Job 4: Docker Build & Smoke Test ──────────────────────────────────────
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create minimal .env for Docker build smoke test
        run: |
          cp .env.example .env
          echo "BINANCE_API_KEY=test_key" >> .env
          echo "BINANCE_SECRET_KEY=test_secret" >> .env

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: runtime
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke test Docker image — Python imports
        run: |
          docker run --rm \
            --env BINANCE_API_KEY=test_key \
            --env BINANCE_SECRET_KEY=test_secret \
            --env PROJECT_ENV=DEVELOPMENT \
            --env LOG_LEVEL=DEBUG \
            --env DRY_RUN=true \
            ${{ env.IMAGE_NAME }}:latest \
            python -c "
          import analytics
          import trading_bot
          import config
          import utils
          print('All core packages imported successfully.')
          "

      - name: Push Docker image to GHCR (on tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha

  # ── Job 5: Release (on tag push only) ─────────────────────────────────────
  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [lint, test, integration, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "PrimeTrade AI ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            requirements.txt
            docker-compose.yml
            .env.example
