repos:
  # ── General file hygiene ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with newline
      - id: check-yaml
        name: Validate YAML files
      - id: check-toml
        name: Validate TOML files
      - id: check-json
        name: Validate JSON files
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: check-added-large-files
        name: Prevent large files from being committed
        args: ["--maxkb=5120"]
      - id: detect-private-key
        name: Detect accidentally committed private keys
      - id: check-case-conflict
        name: Check for case conflicts in filenames
      - id: mixed-line-ending
        name: Normalize line endings
        args: ["--fix=lf"]

  # ── Python formatting — black ───────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        name: Format Python code (black)
        language_version: python3
        args: ["--line-length=127"]
        exclude: ^(dashboard/|venv/|\.venv/)

  # ── Import sorting — isort ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Sort Python imports (isort)
        args: ["--profile=black", "--line-length=127"]
        exclude: ^(dashboard/|venv/|\.venv/)

  # ── Linting — flake8 ────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: Lint Python code (flake8)
        args: ["--max-line-length=127", "--extend-ignore=E203,W503"]
        exclude: ^(dashboard/|venv/|\.venv/)
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions

  # ── Security — bandit ───────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Security scan (bandit)
        args: ["-c", "pyproject.toml", "--skip", "B101,B105,B106"]
        exclude: ^(tests/|dashboard/|venv/)

default_language_version:
  python: python3.12

ci:
  autofix_commit_msg: "style: auto-fixes from pre-commit hooks"
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
